<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" role="img" aria-label="Rusty, the friendly crab mascot">
  <!-- arms -->
  <g stroke="#f74c00" stroke-width="9" stroke-linecap="round">
    <line x1="46" y1="62" x2="72" y2="80"/>
    <line x1="174" y1="62" x2="148" y2="80"/>
  </g>
  <!-- legs -->
  <g stroke="#d63c00" stroke-width="7" stroke-linecap="round">
    <line x1="72" y1="118" x2="58" y2="132"/>
    <line x1="92" y1="124" x2="84" y2="140"/>
    <line x1="128" y1="124" x2="136" y2="140"/>
    <line x1="148" y1="118" x2="162" y2="132"/>
  </g>
  <!-- claws (pac-man style pincers) -->
  <path d="M34 48 L39.8 32 A17 17 0 1 0 50 42.2 Z" fill="#f74c00"/>
  <path d="M186 48 L180.2 32 A17 17 0 1 1 170 42.2 Z" fill="#f74c00"/>
  <!-- spiky shell crown -->
  <path d="M58 76 L70 48 L84 66 L97 42 L110 60 L123 42 L136 66 L150 48 L162 76 Z" fill="#f74c00"/>
  <!-- body -->
  <ellipse cx="110" cy="88" rx="58" ry="40" fill="#f74c00"/>
  <ellipse cx="110" cy="94" rx="50" ry="30" fill="#ff5d14" opacity="0.55"/>
  <!-- eyes -->
  <circle cx="92" cy="82" r="9.5" fill="#fff"/>
  <circle cx="128" cy="82" r="9.5" fill="#fff"/>
  <circle cx="94" cy="84" r="4.6" fill="#2b1608"/>
  <circle cx="126" cy="84" r="4.6" fill="#2b1608"/>
  <circle cx="95.6" cy="82.4" r="1.5" fill="#fff"/>
  <circle cx="127.6" cy="82.4" r="1.5" fill="#fff"/>
  <!-- blush -->
  <circle cx="78" cy="96" r="6" fill="#ffb454" opacity="0.55"/>
  <circle cx="142" cy="96" r="6" fill="#ffb454" opacity="0.55"/>
  <!-- smile -->
  <path d="M100 100 Q110 109 120 100" fill="none" stroke="#5b1d00" stroke-width="3.4" stroke-linecap="round"/>
</svg>
